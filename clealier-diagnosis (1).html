<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセサリー診断 | Clealier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f4ef;
    --warm-white: #faf8f5;
    --gold: #b8975a;
    --gold-light: #d4b483;
    --gold-dark: #8a6d3b;
    --text-dark: #2a2520;
    --text-mid: #6b5f52;
    --text-light: #a89880;
    --border: #e0d8cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text-dark);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- TOP PAGE ---- */
  #page-top {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
    overflow: hidden;
  }

  #page-top::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,151,90,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  #page-top::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,151,90,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(13px, 3vw, 15px);
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .drop-icon {
    width: 48px;
    height: 64px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }

  .top-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1.4;
    text-align: center;
    color: var(--text-dark);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .top-title em {
    font-style: italic;
    color: var(--gold);
  }

  .top-subtitle {
    font-size: 13px;
    line-height: 2;
    text-align: center;
    color: var(--text-mid);
    letter-spacing: 0.1em;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
  }

  .meta-info {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1s;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .meta-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
  }

  .meta-label {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.15em;
  }

  .meta-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  .btn-start {
    display: inline-block;
    padding: 18px 56px;
    background: var(--text-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
    z-index: 0;
  }

  .btn-start:hover::before { transform: translateX(0); }
  .btn-start span { position: relative; z-index: 1; }

  /* ---- QUIZ PAGE ---- */
  #page-quiz {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    padding: 0;
  }

  .quiz-header {
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    background: var(--warm-white);
  }

  .quiz-brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .progress-area {
    width: 100%;
    max-width: 400px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-step {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 0.2em;
  }

  .progress-cur {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    font-weight: 300;
  }

  .progress-bar {
    height: 1px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.6s ease;
  }

  .quiz-body {
    flex: 1;
    padding: 48px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 300;
    text-align: center;
    line-height: 1.7;
    color: var(--text-dark);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .question-sub {
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 44px;
  }

  .options {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .option-btn {
    width: 100%;
    padding: 20px 24px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    text-align: left;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .option-btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--gold);
    transition: width 0.3s ease;
    opacity: 0.08;
  }

  .option-btn:hover { border-color: var(--gold); }
  .option-btn:hover::after { width: 100%; }

  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(184,151,90,0.05);
  }

  .option-btn.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
  }

  .option-label {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-dark);
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }

  .btn-next {
    margin-top: 40px;
    padding: 16px 48px;
    background: var(--text-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.3em;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
  }

  .btn-next.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .btn-next:hover { background: var(--gold-dark); }

  /* ---- RESULT PAGE ---- */
  #page-result {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 0 0 80px;
  }

  .result-header {
    width: 100%;
    padding: 40px 24px 48px;
    background: var(--text-dark);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,151,90,0.15) 0%, transparent 70%);
  }

  .result-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .result-stone-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .result-stone-jp {
    font-size: 13px;
    color: var(--gold-light);
    letter-spacing: 0.2em;
  }

  .result-drop {
    width: 36px;
    height: 48px;
    margin: 28px auto 0;
  }

  .result-body {
    width: 100%;
    max-width: 480px;
    padding: 48px 24px 0;
  }

  .result-catch {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 4.5vw, 24px);
    font-weight: 300;
    font-style: italic;
    line-height: 1.8;
    color: var(--text-dark);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  .result-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 32px;
  }

  .result-desc {
    font-size: 13.5px;
    line-height: 2.2;
    color: var(--text-mid);
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 40px;
  }

  .result-stone-effect {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 40px;
  }

  .effect-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }

  .effect-list {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .effect-tag {
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 0.15em;
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--cream);
  }

  .product-name-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    text-align: center;
    letter-spacing: 0.15em;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .product-price {
    font-size: 13px;
    color: var(--text-light);
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 32px;
  }

  .btn-shop {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--gold);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.3em;
    text-align: center;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.3s ease;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .btn-shop:hover { background: var(--gold-dark); }

  .btn-retry {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--text-mid);
    font-size: 12px;
    letter-spacing: 0.25em;
    text-align: center;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-retry:hover { border-color: var(--gold); color: var(--gold); }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeUp 0.6s ease forwards;
  }

  .page { transition: opacity 0.4s ease; }
</style>
</head>
<body>

<!-- TOP -->
<div id="page-top">
  <div class="brand-name">Clealier</div>
  <svg class="drop-icon" viewBox="0 0 48 64" fill="none">
    <path d="M24 4 C24 4, 44 30, 44 42 C44 54 35 60 24 60 C13 60 4 54 4 42 C4 30 24 4 24 4Z" fill="none" stroke="#b8975a" stroke-width="1.5"/>
    <path d="M24 20 C24 20, 36 38, 36 44 C36 50 30.6 54 24 54" stroke="#b8975a" stroke-width="0.8" opacity="0.5"/>
  </svg>
  <h1 class="top-title">あなただけの、<br><em>お守り</em>を。</h1>
  <p class="top-subtitle">
    今の気持ちに正直に答えてください。<br>
    あなただけのアクセサリーが見つかります。
  </p>
  <div class="meta-info">
    <div class="meta-item">
      <span class="meta-num">5</span>
      <span class="meta-label">questions</span>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <span class="meta-num">1</span>
      <span class="meta-label">minute</span>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <span class="meta-num">6</span>
      <span class="meta-label">results</span>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()"><span>診断スタート</span></button>
</div>

<!-- QUIZ -->
<div id="page-quiz">
  <div class="quiz-header">
    <div class="quiz-brand">Clealier</div>
    <div class="progress-area">
      <div class="progress-label">
        <span class="progress-step">Question <span id="q-num">01</span> / 05</span>
        <span class="progress-cur" id="q-cur">1</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:20%"></div>
      </div>
    </div>
  </div>
  <div class="quiz-body">
    <h2 class="question-text" id="question-text"></h2>
    <p class="question-sub" id="question-sub"></p>
    <div class="options" id="options"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
  </div>
</div>

<!-- RESULT -->
<div id="page-result">
  <div class="result-header">
    <p class="result-label">Your Amulet</p>
    <h2 class="result-stone-name" id="result-stone-name"></h2>
    <p class="result-stone-jp" id="result-stone-jp"></p>
    <svg class="result-drop" viewBox="0 0 36 48" fill="none">
      <path d="M18 3 C18 3, 33 22, 33 31 C33 40.5 26.3 45 18 45 C9.7 45 3 40.5 3 31 C3 22 18 3 18 3Z" fill="#b8975a" opacity="0.25"/>
      <path d="M18 3 C18 3, 33 22, 33 31 C33 40.5 26.3 45 18 45 C9.7 45 3 40.5 3 31 C3 22 18 3 18 3Z" fill="none" stroke="#b8975a" stroke-width="1"/>
    </svg>
  </div>
  <div class="result-body">
    <p class="result-catch" id="result-catch"></p>
    <div class="result-divider"></div>
    <p class="result-desc" id="result-desc"></p>
    <div class="result-stone-effect">
      <p class="effect-title">Stone Effects</p>
      <div class="effect-list" id="effect-list"></div>
    </div>
    <p class="product-name-display" id="product-name"></p>
    <p class="product-price" id="product-price"></p>
    <a href="#" id="btn-shop" class="btn-shop">商品を見る</a>
    <button class="btn-retry" onclick="restart()">もう一度診断する</button>
  </div>
</div>

<script>
const questions = [
  {
    text: "今の自分に一番近いのは？",
    sub: "直感でお答えください",
    options: [
      { label: "新しいことに挑戦したい、もっと集中したい", val: "A" },
      { label: "少し疲れた、自分を整えたい", val: "B" },
      { label: "大切な人とのつながりを深めたい", val: "C" },
      { label: "ありのままの自分に戻りたい", val: "D" },
      { label: "シンプルに、今の自分を肯定したい", val: "E" },
    ]
  },
  {
    text: "最近、自分のために泣いたことがある？",
    sub: "感情に正直に",
    options: [
      { label: "ある。感情に素直でいられている", val: "honest" },
      { label: "ない。どこかで抑えているかも", val: "suppress" },
    ]
  },
  {
    text: "このアクセサリーをつけたいのはどんな時？",
    sub: "",
    options: [
      { label: "毎日の仕事や通勤に", val: "daily" },
      { label: "大切な日や特別なシーンに", val: "special" },
      { label: "自分へのご褒美として", val: "reward" },
    ]
  },
  {
    text: "今一番欲しいのは？",
    sub: "",
    options: [
      { label: "前に進む強さ", val: "strength" },
      { label: "心の安らぎ", val: "peace" },
      { label: "誰かとのつながり", val: "bond" },
      { label: "ありのままでいられる自由", val: "freedom" },
    ]
  },
  {
    text: "アクセサリーに求めるのは？",
    sub: "",
    options: [
      { label: "お守り・パワーをくれる感じ", val: "power" },
      { label: "さりげなく毎日寄り添う感じ", val: "simple" },
    ]
  }
];

const results = {
  clearite: {
    stoneName: "Clearite",
    stoneJp: "フローライト",
    catch: "あなたの知性と創造性が、\nいま最も輝くとき。",
    desc: "挑戦を続けるあなたへ。フローライトは「天才の石」とも呼ばれ、集中力と創造性を高めてくれると言われています。このネックレスをお守りに、あなたの可能性を思い切り広げてください。",
    effects: ["知性", "創造性", "集中力"],
    productName: "clearite",
    price: "¥14,800",
    url: "#"
  },
  clearamethyst: {
    stoneName: "Clearamethyst",
    stoneJp: "ラベンダーアメジスト",
    catch: "深呼吸して、\n自分の内側に目を向けるときです。",
    desc: "頑張りすぎているあなたへ。ラベンダーアメジストは、心を落ち着かせ感情を穏やかに整える石。忙しい日々の中で、自分を取り戻す時間をそっと思い出させてくれます。",
    effects: ["心の安定", "内省", "穏やかさ"],
    productName: "clearamethyst",
    price: "¥14,800",
    url: "#"
  },
  clearose: {
    stoneName: "Clearose",
    stoneJp: "ローズクォーツ",
    catch: "あなたの愛が、\n周りを温める。",
    desc: "人とのつながりを大切にするあなたへ。ローズクォーツは持ち主を優しいオーラで包み込み、愛する心を呼び覚ましてくれます。大切な関係をさらに深める、特別なお守りです。",
    effects: ["愛", "つながり", "女性性"],
    productName: "clearose",
    price: "¥14,800",
    url: "#"
  },
  cleartz: {
    stoneName: "Cleartz",
    stoneJp: "ホワイトクォーツ",
    catch: "余分なものを手放して、\n本来のあなたへ。",
    desc: "リセットしたいあなたへ。ホワイトクォーツは悪いものを浄化し、自分本来の魅力を引き出してくれる石。ありのままの自分で輝くための、静かで力強いお守りです。",
    effects: ["浄化", "自己成長", "本来の自分"],
    productName: "cleartz",
    price: "¥14,800",
    url: "#"
  },
  cleadropGold: {
    stoneName: "Cleadrop",
    stoneJp: "14KGF ゴールド",
    catch: "流した涙は、\nあなたが正直に生きた証。",
    desc: "今日も自分らしく前を向くあなたへ。しずくモチーフは、あなたがこれまでに流した涙のしるし。それは弱さではなく、自分に正直に生きた証です。触れるたびに、その強さを思い出してください。",
    effects: ["自己肯定", "強さ", "日常のお守り"],
    productName: "cleadrop / 14KGF",
    price: "¥14,800",
    url: "#"
  },
  cleadropSilver: {
    stoneName: "Cleadrop",
    stoneJp: "SV925 シルバー",
    catch: "流した涙は、\nあなたが正直に生きた証。",
    desc: "シンプルに自分を肯定したいあなたへ。しずくモチーフは、あなたがこれまでに流した涙のしるし。SV925のシルバーチェーンが、毎日の装いにさりげなく寄り添います。",
    effects: ["自己肯定", "日常使い", "シンプル"],
    productName: "cleadrop / SV925",
    price: "¥13,800",
    url: "#"
  }
};

let answers = [];
let currentQ = 0;

function startQuiz() {
  document.getElementById('page-top').style.display = 'none';
  const quiz = document.getElementById('page-quiz');
  quiz.style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const num = String(currentQ + 1).padStart(2, '0');
  document.getElementById('q-num').textContent = num;
  document.getElementById('q-cur').textContent = currentQ + 1;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / 5) * 100}%`;

  const qtEl = document.getElementById('question-text');
  const qsEl = document.getElementById('question-sub');
  qtEl.classList.remove('fade-in');
  void qtEl.offsetWidth;
  qtEl.classList.add('fade-in');
  qtEl.textContent = q.text;
  qsEl.textContent = q.sub;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${opt.label}</span>`;
    btn.style.opacity = '0';
    btn.style.animation = `fadeUp 0.4s ease forwards ${0.1 + i * 0.08}s`;
    btn.addEventListener('click', () => selectOption(btn, opt.val));
    opts.appendChild(btn);
  });

  document.getElementById('btn-next').classList.remove('visible');
}

function selectOption(btn, val) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = val;
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

async function showResult() {
  document.getElementById('page-quiz').style.display = 'none';
  const resultPage = document.getElementById('page-result');
  resultPage.style.display = 'flex';

  const key = calcResult();
  const r = results[key];

  document.getElementById('result-stone-name').textContent = r.stoneName;
  document.getElementById('result-stone-jp').textContent = r.stoneJp;
  document.getElementById('product-name').textContent = r.productName;
  document.getElementById('product-price').textContent = r.price + ' (tax included)';
  document.getElementById('btn-shop').href = r.url;
  const ef = document.getElementById('effect-list');
  ef.innerHTML = r.effects.map(e => `<span class="effect-tag">${e}</span>`).join('');

  const catchEl = document.getElementById('result-catch');
  const descEl = document.getElementById('result-desc');
  catchEl.innerHTML = '<span style="color:var(--gold-light);font-style:italic;font-size:14px;">あなたへのメッセージを紡いでいます…</span>';
  descEl.innerHTML = '';

  window.scrollTo(0, 0);

  const answerSummary = questions.map((q, i) => {
    const selected = q.options.find(o => o.val === answers[i]);
    return `Q${i+1}「${q.text}」→「${selected ? selected.label : ''}」`;
  }).join('\n');

  const prompt = `あなたはClealierというアクセサリーブランドのコピーライターです。

ブランドコンセプト：
しずくモチーフは、あなたがこれまでに流した涙のしるし。それは弱さではなく「自分に正直に生きた証」です。触れるたびに勇気をくれて、あなたの頑張りを見守る特別なお守りに。

おすすめ商品：${r.stoneName}（${r.stoneJp}）
石の効果：${r.effects.join('・')}

ユーザーの回答：
${answerSummary}

上記を踏まえて、以下の2つを日本語で生成してください。JSONのみで返答し、マークダウンや前置きは不要です。

{
  "catch": "このユーザーに響く、詩的で短いキャッチコピー（20〜35文字、改行は\nで表現可）",
  "desc": "このユーザーへの共感と、この石が寄り添う理由を伝える文章（80〜120文字、温かく丁寧なトーンで）"
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    catchEl.textContent = parsed.catch.replace(/\n/g, '\n');
    descEl.textContent = parsed.desc;
  } catch (e) {
    catchEl.textContent = r.catch;
    descEl.textContent = r.desc;
  }
}

function calcResult() {
  const q1 = answers[0];  // A/B/C/D/E
  const q4 = answers[3];  // strength/peace/bond/freedom
  const q5 = answers[4];  // power/simple

  // E → しずく系
  if (q1 === 'E') {
    return q5 === 'simple' ? 'cleadropSilver' : 'cleadropGold';
  }
  // A → フローライト
  if (q1 === 'A') return 'clearite';
  // B → アメジスト
  if (q1 === 'B') return 'clearamethyst';
  // C → ローズクォーツ
  if (q1 === 'C') return 'clearose';
  // D → ホワイトクォーツ
  if (q1 === 'D') return 'cleartz';

  // フォールバック：Q4で補完
  const map = { strength: 'clearite', peace: 'clearamethyst', bond: 'clearose', freedom: 'cleartz' };
  return map[q4] || 'cleadropGold';
}

function restart() {
  answers = [];
  currentQ = 0;
  document.getElementById('page-result').style.display = 'none';
  document.getElementById('page-top').style.display = 'flex';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
